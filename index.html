<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ВСПЫШКА</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #ff8c00; --text: #fff; --gray: #777; --red: #ff4444; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100dvh; overflow: hidden; }
        .screen { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 10; padding-bottom: 85px; }
        .screen.active { display: flex; }
        header { padding: 15px; background: var(--card); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .btn { background: var(--accent); color: #000; border: none; padding: 14px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.1s; }
        #bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: var(--card); display: none; border-radius: 35px; border: 1px solid #333; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #bottom-nav.visible { display: flex; }
        .nav-btn { flex: 1; background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); border-radius: 35px; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 22px; }
        .nav-btn span { font-size: 10px; margin-top: 4px; font-weight: bold; }
        .profile-card { background: var(--card); margin: 15px; padding: 20px; border-radius: 20px; border-left: 5px solid var(--accent); }
        .info-label { color: var(--accent); font-size: 11px; text-transform: uppercase; margin-bottom: 5px; }
        .info-value { font-size: 17px; margin-bottom: 15px; }
        #chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 15px 20px; border-bottom: 1px solid #111; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 50px; height: 50px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 16px; position: relative; user-select: none; }
        .in { align-self: flex-start; background: #222; }
        .out { align-self: flex-end; background: var(--accent); color: #000; }
        .input-bar { padding: 10px 15px 35px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #222; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: var(--card); width: 85%; padding: 30px; border-radius: 25px; text-align: center; }
        input { width: 100%; padding: 15px; border-radius: 30px; background:#1a1a1a; border:1px solid #333; color:#fff; margin-bottom: 10px; outline: none; }
        .context-menu { position: fixed; background: #222; border-radius: 15px; padding: 10px; display: none; flex-direction: column; z-index: 3000; border: 1px solid #444; width: 200px; }
        .context-item { padding: 10px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .context-item:active { background: #333; }
        .context-item.del { color: var(--red); }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="display:flex; justify-content:center; align-items:center; z-index:20; padding-bottom:0;">
        <div id="login-form" style="width:85%; text-align:center;">
            <h1 style="color:var(--accent); font-size:45px; margin-bottom:30px;">ВСПЫШКА</h1>
            <input type="email" id="log-email" placeholder="Email">
            <input type="password" id="log-pass" placeholder="Пароль">
            <button class="btn" onclick="app.auth('login')" style="width:100%;">ВОЙТИ</button>
            <button onclick="app.toggleAuth(true)" style="background:none; border:none; color:var(--gray); margin-top:15px;">Нет аккаунта? Регистрация</button>
        </div>
        <div id="reg-form" style="width:85%; text-align:center; display:none;">
            <h1 style="color:var(--accent); font-size:35px; margin-bottom:20px;">СОЗДАТЬ</h1>
            <input type="email" id="reg-email" placeholder="Email">
            <input type="text" id="reg-name" placeholder="Имя">
            <input type="text" id="reg-nick" placeholder="Никнейм">
            <input type="password" id="reg-pass" placeholder="Пароль">
            <button class="btn" onclick="app.auth('reg')" style="width:100%;">РЕГИСТРАЦИЯ</button>
            <button onclick="app.toggleAuth(false)" style="background:none; border:none; color:var(--gray); margin-top:15px;">Уже есть аккаунт? Войти</button>
        </div>
    </div>

    <div id="list-screen" class="screen">
        <header><b style="color:var(--accent); font-size:22px;">ВСПЫШКА</b></header>
        <div id="chat-list"></div>
        <button class="btn" style="position:fixed; bottom:100px; right:20px; border-radius:50%; width:60px; height:60px; font-size:25px;" onclick="app.toggleModal('search-modal', true)">+</button>
    </div>

    <div id="settings-screen" class="screen">
        <header><b style="color:var(--accent); font-size:22px;">ПРОФИЛЬ</b></header>
        <div class="profile-card">
            <div class="info-label">ID</div>
            <div id="prof-uid" class="info-value" style="font-size:10px; color:var(--gray);">...</div>
            <div class="info-label">Имя</div>
            <div id="prof-name" class="info-value">...</div>
            <button class="btn" style="font-size:12px; padding:8px 15px;" onclick="app.editName()">Сменить имя</button>
            <div class="info-label" style="margin-top:20px;">Никнейм</div>
            <div id="prof-nick" class="info-value">@...</div>
            <button class="btn" style="font-size:12px; padding:8px 15px;" onclick="app.editNick()">Сменить ник</button>
        </div>
        <button class="btn" style="background:var(--red); color:white; margin:15px;" onclick="app.logout()">ВЫЙТИ ИЗ АККАУНТА</button>
    </div>

    <div id="chat-window" class="screen" style="z-index:100; padding-bottom:0;">
        <header>
            <div onclick="app.closeChat()" style="color:var(--accent); cursor:pointer;"><i class="fas fa-chevron-left"></i> Назад</div>
            <b id="chat-title">Чат</b>
            <div id="chat-avatar" class="avatar" style="width:35px; height:35px; font-size:14px;">?</div>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Сообщение...">
            <button class="btn" onclick="app.send()">ОК</button>
        </div>
    </div>

    <div id="bottom-nav">
        <button class="nav-btn active" id="btn-chats" onclick="app.tab('chats')">
            <i class="fas fa-comment"></i><span>ЧАТЫ</span>
        </button>
        <button class="nav-btn" id="btn-settings" onclick="app.tab('settings')">
            <i class="fas fa-user"></i><span>ПРОФИЛЬ</span>
        </button>
    </div>

    <div id="search-modal" class="modal">
        <div class="modal-box">
            <input type="text" id="search-input" placeholder="@ник...">
            <button class="btn" onclick="app.findUser()" style="width:100%;">НАЙТИ</button>
            <button class="btn" onclick="app.toggleModal('search-modal', false)" style="width:100%; margin-top:10px; background:#222; color:#fff;">ОТМЕНА</button>
        </div>
    </div>

    <div id="msg-menu" class="context-menu">
        <div class="context-item" onclick="app.copyMsg()"><i class="fas fa-copy"></i> Копировать</div>
        <div class="context-item" onclick="app.deleteMsg('me')"><i class="fas fa-trash"></i> Удалить у себя</div>
        <div id="del-all-btn" class="context-item del" onclick="app.deleteMsg('all')"><i class="fas fa-dumpster"></i> Удалить у всех</div>
    </div>

    <script>
        const client = new Appwrite.Client();
        client
            .setEndpoint('https://fra.cloud.appwrite.io/v1') 
            .setProject('6a0ad8400006365730b5');        

        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);

        const app = {
            me: null, myId: null, currentOpponentId: null, currentMsgId: null, currentMsgText: null, currentMsgIsMe: false,
            chats: JSON.parse(localStorage.getItem('f_chats') || "{}"),
            dbId: '6a0adb260034b853e4b8', // Твой правильный Database ID
            unsubscribe: null,

            toggleAuth(isReg) {
                document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
                document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
            },
            tab(name) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('bottom-nav').classList.add('visible');
                if(name === 'chats') {
                    document.getElementById('list-screen').classList.add('active');
                    document.getElementById('btn-chats').classList.add('active');
                } else {
                    document.getElementById('settings-screen').classList.add('active');
                    document.getElementById('btn-settings').classList.add('active');
                    this.updateProfUI();
                }
            },
            updateProfUI() {
                if(!this.me) return;
                document.getElementById('prof-uid').innerText = this.myId;
                document.getElementById('prof-name').innerText = this.me.name;
                document.getElementById('prof-nick').innerText = '@' + this.me.nickname;
            },
            async auth(type) {
                try {
                    if(type === 'reg') {
                        const email = document.getElementById('reg-email').value, pass = document.getElementById('reg-pass').value;
                        const name = document.getElementById('reg-name').value, nick = document.getElementById('reg-nick').value.toLowerCase().trim();
                        if(!email || !pass || !name || !nick) return alert("Заполни все поля!");

                        const check = await databases.listDocuments(this.dbId, 'users', [
                            Appwrite.Query.equal('nickname', nick)
                        ]);
                        if(check.total > 0) return alert("Ник занят!");

                        const res = await account.create('unique()', email, pass);
                        await account.createEmailPasswordSession(email, pass);

                        await databases.createDocument(this.dbId, 'users', res.$id, {
                            user_id: res.$id,
                            name: name,
                            nickname: nick
                        });
                    } else {
                        await account.createEmailPasswordSession(
                            document.getElementById('log-email').value, 
                            document.getElementById('log-pass').value
                        );
                    }
                    location.reload();
                } catch(err) { alert(err.message); }
            },
            async init(user) {
                this.myId = user.$id;
                try {
                    const doc = await databases.getDocument(this.dbId, 'users', this.myId);
                    this.me = doc;
                    document.getElementById('auth-screen').style.display = 'none';
                    this.tab('chats');
                    this.renderList();

                    client.subscribe(`databases.${this.dbId}.collections.users.documents.${this.myId}`, response => {
                        this.me = response.payload;
                        this.updateProfUI();
                    });

                    client.subscribe(`databases.${this.dbId}.collections.messages.documents`, async response => {
                        const m = response.payload;
                        if (m.receiver_id === this.myId && !this.chats[m.sender_id]) {
                            const uDoc = await databases.getDocument(this.dbId, 'users', m.sender_id);
                            this.chats[m.sender_id] = { name: uDoc.name, nick: uDoc.nickname };
                            this.save(); this.renderList();
                        }
                    });

                } catch (e) {
                    alert("Ошибка загрузки профиля. Проверьте, созданы ли коллекции 'users' и 'messages' внутри этой базы данных.");
                }
            },
            async editName() { 
                const n = prompt("Новое имя:", this.me.name); 
                if(n) await databases.updateDocument(this.dbId, 'users', this.myId, { name: n }); 
            },
            async editNick() {
                const n = prompt("Новый ник:").toLowerCase().trim();
                if(!n || n === this.me.nickname) return;
                const check = await databases.listDocuments(this.dbId, 'users', [Appwrite.Query.equal('nickname', n)]);
                if(check.total > 0) return alert("Ник занят!");
                await databases.updateDocument(this.dbId, 'users', this.myId, { nickname: n });
            },
            renderList() {
                const l = document.getElementById('chat-list'); l.innerHTML = '';
                for(let id in this.chats) {
                    const d = document.createElement('div'); d.className = 'chat-item';
                    d.innerHTML = `<div class="avatar">${this.chats[id].name[0].toUpperCase()}</div>
                        <div style="flex:1" onclick="app.openChat('${id}', '${this.chats[id].name}')">
                            <div style="font-weight:bold;">${this.chats[id].name}</div>
                            <div style="color:var(--gray); font-size:12px;">@${this.chats[id].nick}</div>
                        </div>`;
                    l.appendChild(d);
                }
            },
            async openChat(id, name) {
                this.currentOpponentId = id;
                document.getElementById('chat-window').classList.add('active');
                document.getElementById('bottom-nav').classList.remove('visible');
                document.getElementById('chat-title').innerText = name;
                document.getElementById('chat-avatar').innerText = name[0].toUpperCase();
                const box = document.getElementById('messages'); box.innerHTML = '';

                if(this.unsubscribe) this.unsubscribe();

                try {
                    const res = await databases.listDocuments(this.dbId, 'messages', [
                        Appwrite.Query.or([
                            Appwrite.Query.and([Appwrite.Query.equal('sender_id', this.myId), Appwrite.Query.equal('receiver_id', id)]),
                            Appwrite.Query.and([Appwrite.Query.equal('sender_id', id), Appwrite.Query.equal('receiver_id', this.myId)])
                        ]),
                        Appwrite.Query.orderAsc('timestamp'),
                        Appwrite.Query.limit(100)
                    ]);

                    res.documents.forEach(m => {
                        this.renderMsg(m.$id, m.sender_id === this.myId, m.text);
                    });
                } catch(e) { console.error(e); }

                this.unsubscribe = client.subscribe(`databases.${this.dbId}.collections.messages.documents`, response => {
                    const m = response.payload;
                    const isNewMessageForThisChat = 
                        (m.sender_id === this.myId && m.receiver_id === id) || 
                        (m.sender_id === id && m.receiver_id === this.myId);

                    if (isNewMessageForThisChat) {
                        if (response.events.some(e => e.includes('.create'))) {
                            this.renderMsg(m.$id, m.sender_id === this.myId, m.text);
                        } else if (response.events.some(e => e.includes('.delete'))) {
                            const el = document.querySelector(`[data-id="${m.$id}"]`);
                            if(el) el.remove();
                        }
                    }
                });
            },
            renderMsg(mid, isMe, t) {
                const b = document.getElementById('messages');
                if (document.querySelector(`[data-id="${mid}"]`)) return; 
                const d = document.createElement('div');
                d.className = `msg ${isMe ? 'out' : 'in'}`; d.innerText = t; d.dataset.id = mid;
                let timer;
                d.addEventListener('touchstart', e => { timer = setTimeout(() => this.showMenu(e, mid, t, isMe), 600); });
                d.addEventListener('touchend', () => clearTimeout(timer));
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            },
            showMenu(e, mid, text, isMe) {
                this.currentMsgId = mid; this.currentMsgText = text; this.currentMsgIsMe = isMe;
                const menu = document.getElementById('msg-menu');
                menu.style.display = 'flex';
                menu.style.top = (e.touches[0].clientY > window.innerHeight - 150 ? e.touches[0].clientY - 150 : e.touches[0].clientY) + 'px';
                menu.style.left = '50px';
                document.getElementById('del-all-btn').style.display = isMe ? 'flex' : 'none';
            },
            copyMsg() { navigator.clipboard.writeText(this.currentMsgText); this.closeMenu(); },
            async deleteMsg(mode) {
                if(mode === 'all' && this.currentMsgIsMe) {
                    await databases.deleteDocument(this.dbId, 'messages', this.currentMsgId);
                } else {
                    const el = document.querySelector(`[data-id="${this.currentMsgId}"]`);
                    if(el) el.style.display = 'none';
                }
                this.closeMenu();
            },
            async send() {
                const i = document.getElementById('m-input'), t = i.value.trim();
                if(!t || !this.currentOpponentId) return;

                await databases.createDocument(this.dbId, 'messages', 'unique()', {
                    sender_id: this.myId,
                    receiver_id: this.currentOpponentId,
                    text: t,
                    timestamp: Date.now()
                });
                i.value = '';
            },
            async findUser() {
                const t = document.getElementById('search-input').value.trim().toLowerCase().replace('@','');
                try {
                    const res = await databases.listDocuments(this.dbId, 'users', [
                        Appwrite.Query.equal('nickname', t)
                    ]);
                    if(res.total > 0) {
                        const user = res.documents[0];
                        this.chats[user.user_id] = { name: user.name, nick: user.nickname };
                        this.save(); this.toggleModal('search-modal', false);
                        this.openChat(user.user_id, user.name); this.renderList();
                    } else {
                        alert("Никто не найден");
                    }
                } catch(e) { alert("Ошибка поиска: " + e.message); }
            },
            closeChat() { 
                if(this.unsubscribe) this.unsubscribe();
                this.currentOpponentId = null;
                document.getElementById('chat-window').classList.remove('active'); 
                document.getElementById('bottom-nav').classList.add('visible'); 
            },
            closeMenu() { document.getElementById('msg-menu').style.display = 'none'; },
            toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; },
            save() { localStorage.setItem('f_chats', JSON.stringify(this.chats)); },
            async logout() { 
                try {
                    await account.deleteSession('current');
                    localStorage.clear(); 
                    location.reload(); 
                } catch(e) { location.reload(); }
            }
        };

        window.onclick = (e) => { if(!e.target.closest('.msg')) app.closeMenu(); };
        window.onload = async () => {
            try {
                const user = await account.get();
                app.init(user);
            } catch (e) {
                document.getElementById('auth-screen').style.display = 'flex';
            }
        };
    </script>
</body>
</html>
