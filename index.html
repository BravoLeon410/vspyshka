<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ВСПЫШКА</title>
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000; --card: #121212; --accent: #ff8c00; --text: #fff; --gray: #777; --red: #ff4444; --green: #00ffcc; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            height: calc(var(--vh, 1vh) * 100); 
            overflow: hidden; 
            position: relative; 
        }
        
        .msg, .post-card, .comment-card, .chat-item { 
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .screen { 
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            height: calc(var(--vh, 1vh) * 100); 
            background: var(--bg); 
            display: none; 
            flex-direction: column; 
            z-index: 10; 
        }
        .screen.active { display: flex; }

        #feed-screen, #list-screen, #settings-screen { padding-bottom: 85px; }
        #chat-window, #comments-window { padding-bottom: 0; }

        header { padding: 15px; background: var(--card); border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; height: 60px; flex-shrink: 0; }
        
        .btn { background: var(--accent); color: #000; border: none; padding: 12px 24px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        
        .fab-btn { position: fixed; bottom: 100px; right: 20px; border-radius: 50%; width: 56px; height: 56px; font-size: 24px; z-index: 99; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4); }

        #bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; height: 70px; background: rgba(18, 18, 18, 0.8); display: none; border-radius: 35px; border: 1px solid #252525; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
        #bottom-nav.visible { display: flex; }
        .nav-btn { flex: 1; background: none; border: none; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--gray); border-radius: 35px; transition: 0.1s; }
        .nav-btn.active { color: var(--accent); }
        .nav-btn i { font-size: 20px; }
        .nav-btn span { font-size: 10px; margin-top: 4px; font-weight: bold; }
        
        #chat-list, #feed-container, #comments-list { flex: 1; overflow-y: auto; padding: 5px 0; }
        .chat-item, .post-card, .comment-card { padding: 16px; border-bottom: 1px solid #1a1a1a; background: var(--card); margin: 10px 14px; border-radius: 18px; position: relative; }
        
        .post-card.admin-post { border: 1px solid rgba(255, 140, 0, 0.4); box-shadow: 0 4px 20px rgba(255, 140, 0, 0.1); }
        .admin-badge { background: var(--accent); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 10px; font-weight: bold; margin-left: 5px; text-transform: uppercase; vertical-align: middle; }

        .avatar { width: 44px; height: 44px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 18px; flex-shrink: 0; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #050505; }
        .msg { max-width: 78%; padding: 11px 15px; border-radius: 20px; font-size: 15px; position: relative; display: flex; flex-direction: column; line-height: 1.4; }
        .in { align-self: flex-start; background: #1c1c1e; border-bottom-left-radius: 5px; }
        .out { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 5px; }
        .msg-time { font-size: 9px; align-self: flex-end; margin-top: 5px; opacity: 0.6; }
        
        .input-bar { padding: 12px 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid #222; flex-shrink: 0; align-items: center; }
        
        input[type="text"], input[type="email"], input[type="password"], textarea { 
            width: 100%; padding: 14px 20px; border-radius: 25px; background:#181818; border:1px solid #282828; color:#fff; outline: none; font-size: 15px; transition: 0.2s;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus, textarea:focus { border-color: var(--accent); background: #1f1f1f; }
        
        textarea { resize: none; border-radius: 18px; height: 100px; font-family: sans-serif; }

        .pass-container { position: relative; width: 100%; margin-top: 12px; }
        .pass-container i { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); color: var(--gray); cursor: pointer; padding: 5px; }

        .last-msg-preview { color: var(--gray); font-size: 13px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 2000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
        .modal-box { background: var(--card); width: 88%; max-width: 400px; padding: 25px; border-radius: 28px; text-align: center; border: 1px solid #252525; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .modal-box h3 { margin-bottom: 20px; color: var(--accent); font-size: 20px; }
        
        .context-menu { position: fixed; background: #1f1f1f; border-radius: 16px; padding: 6px; display: none; flex-direction: column; z-index: 3000; border: 1px solid #333; width: 190px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .context-item { padding: 12px 14px; color: #fff; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 10px; }
        .context-item:active { background: #2a2a2a; }
        .context-item.del { color: var(--red); }
        .online-tag { font-size: 11px; color: var(--green); margin-top: 2px; font-weight: 500; }
        .offline-tag { font-size: 11px; color: var(--gray); margin-top: 2px; }
        
        .profile-field { display: flex; justify-content: space-between; align-items: center; background: #181818; padding: 14px 16px; border-radius: 14px; margin-bottom: 14px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen" class="screen" style="display:flex; justify-content:center; align-items:center; z-index:20;">
        <div id="login-form" style="width:85%; text-align:center;">
            <h1 style="color:var(--accent); font-size:45px; margin-bottom:30px; letter-spacing: 2px;">ВСПЫШКА</h1>
            <input type="email" id="log-email" placeholder="Email" autocomplete="off">
            <div class="pass-container">
                <input type="password" id="log-pass" placeholder="Пароль">
                <i class="fas fa-eye" onclick="app.togglePassVisibility('log-pass', this)"></i>
            </div>
            <button class="btn" onclick="app.auth('login')" style="width:100%; margin-top:20px;">ВОЙТИ</button>
            <button onclick="app.toggleAuth(true)" style="background:none; border:none; color:var(--gray); margin-top:20px; font-size:14px;">Нет аккаунта? Регистрация</button>
        </div>
        <div id="reg-form" style="width:85%; text-align:center; display:none;">
            <h1 style="color:var(--accent); font-size:35px; margin-bottom:20px; letter-spacing: 1px;">СОЗДАТЬ</h1>
            <input type="email" id="reg-email" placeholder="Email" autocomplete="off">
            <input type="text" id="reg-name" placeholder="Имя" autocomplete="off" style="margin-top:12px;">
            <input type="text" id="reg-nick" placeholder="Никнейм" autocomplete="off" style="margin-top:12px;">
            <div class="pass-container">
                <input type="password" id="reg-pass" placeholder="Пароль">
                <i class="fas fa-eye" onclick="app.togglePassVisibility('reg-pass', this)"></i>
            </div>
            <div class="pass-container">
                <input type="password" id="reg-pass-confirm" placeholder="Повторите пароль">
                <i class="fas fa-eye" onclick="app.togglePassVisibility('reg-pass-confirm', this)"></i>
            </div>
            <button class="btn" onclick="app.auth('reg')" style="width:100%; margin-top:20px;">РЕГИСТРАЦИЯ</button>
            <button onclick="app.toggleAuth(false)" style="background:none; border:none; color:var(--gray); margin-top:20px; font-size:14px;">Уже есть аккаунт? Войти</button>
        </div>
    </div>

    <div id="feed-screen" class="screen">
        <header><b style="color:var(--accent); font-size:22px;">ЛЕНТА</b></header>
        <div id="feed-container"></div>
        <button class="btn fab-btn" onclick="app.toggleModal('post-modal', true)"><i class="fas fa-plus"></i></button>
    </div>

    <div id="list-screen" class="screen">
        <header><b style="color:var(--accent); font-size:22px;">ВСПЫШКА</b></header>
        <div id="chat-list"></div>
        <button class="btn fab-btn" onclick="app.toggleModal('search-modal', true)"><i class="fas fa-plus"></i></button>
    </div>

    <div id="settings-screen" class="screen">
        <header><b style="color:var(--accent); font-size:22px;">ПРОФИЛЬ</b></header>
        <div style="background: var(--card); margin: 15px; padding: 20px; border-radius: 20px; border-left: 5px solid var(--accent); overflow-y: auto;">
            <div style="color: var(--accent); font-size: 11px; text-transform: uppercase; margin-bottom: 5px;">Имя</div>
            <div class="profile-field">
                <span id="prof-name" style="font-size: 18px; font-weight: bold;">...</span>
                <i class="fas fa-pen" style="color:var(--accent); cursor:pointer;" onclick="app.editProfileField('name')"></i>
            </div>
            <div style="color: var(--accent); font-size: 11px; text-transform: uppercase; margin-bottom: 5px;">Никнейм</div>
            <div class="profile-field">
                <span id="prof-nick" style="font-size: 16px; color:#aaa;">@...</span>
                <i class="fas fa-pen" style="color:var(--accent); cursor:pointer;" onclick="app.editProfileField('nickname')"></i>
            </div>
            <div style="color: var(--accent); font-size: 11px; text-transform: uppercase; margin-bottom: 5px;">Электронная почта</div>
            <div class="profile-field">
                <span id="prof-email" style="font-size: 15px; color:#aaa;">***********</span>
                <i id="email-eye" class="fas fa-eye" style="color:var(--accent); cursor:pointer;" onclick="app.toggleEmailVisibility()"></i>
            </div>
            <button class="btn" style="background:var(--red); color:white; width:100%; margin-top:20px; border-radius:12px;" onclick="app.logout()">ВЫЙТИ ИЗ АККАУНТА</button>
        </div>
    </div>

    <div id="chat-window" class="screen" style="z-index:100;">
        <header>
            <div onclick="app.closeChat()" style="color:var(--accent); cursor:pointer; padding:5px 10px;"><i class="fas fa-chevron-left"></i></div>
            <div style="text-align:center; flex:1; margin-right:40px;">
                <b id="chat-title">Чат</b>
                <div id="chat-status" class="offline-tag">офлайн</div>
            </div>
        </header>
        <div id="messages"></div>
        <div class="input-bar">
            <input type="text" id="m-input" placeholder="Сообщение..." autocomplete="off" enterkeyhint="send">
            <button class="btn" onclick="app.sendMsg()">ОК</button>
        </div>
    </div>

    <div id="comments-window" class="screen" style="z-index:150;">
        <header>
            <div onclick="app.closeComments()" style="color:var(--accent); cursor:pointer; padding:5px 10px;"><i class="fas fa-chevron-left"></i> Назад</div>
            <b>Комментарии</b><div></div>
        </header>
        <div id="comments-list"></div>
        <div class="input-bar">
            <input type="text" id="comment-input" placeholder="Написать комментарий..." autocomplete="off">
            <button class="btn" onclick="app.sendComment()">ОК</button>
        </div>
    </div>

    <div id="bottom-nav">
        <button class="nav-btn" id="btn-feed" onclick="app.tab('feed')">
            <i class="fas fa-rss"></i><span>ЛЕНТА</span>
        </button>
        <button class="nav-btn" id="btn-chats" onclick="app.tab('chats')">
            <i class="fas fa-comment"></i><span>ЧАТЫ</span>
        </button>
        <button class="nav-btn" id="btn-settings" onclick="app.tab('settings')">
            <i class="fas fa-user"></i><span>ПРОФИЛЬ</span>
        </button>
    </div>

    <div id="post-modal" class="modal">
        <div class="modal-box">
            <h3>Новая вспышка</h3>
            <textarea id="post-input" placeholder="Что у вас нового?..." autocomplete="off"></textarea>
            <button class="btn" onclick="app.createPost()" style="width:100%; margin-top:15px;">ОПУБЛИКОВАТЬ</button>
            <button class="btn" onclick="app.toggleModal('post-modal', false)" style="width:100%; margin-top:8px; background:#222; color:#fff;">ОТМЕНА</button>
        </div>
    </div>

    <div id="search-modal" class="modal">
        <div class="modal-box">
            <h3>Найти собеседника</h3>
            <input type="text" id="search-input" placeholder="@ник..." autocomplete="off">
            <button class="btn" onclick="app.findUser()" style="width:100%; margin-top:15px;">НАЙТИ</button>
            <button class="btn" onclick="app.toggleModal('search-modal', false)" style="width:100%; margin-top:8px; background:#222; color:#fff;">ОТМЕНА</button>
        </div>
    </div>

    <div id="context-menu" class="context-menu"></div>

    <script>
        const client = new Appwrite.Client();
        client.setEndpoint('https://fra.cloud.appwrite.io/v1').setProject('6a0ad8400006365730b5');        

        const account = new Appwrite.Account(client);
        const databases = new Appwrite.Databases(client);

        function resetViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
            
            if (document.getElementById('chat-window').classList.contains('active')) {
                const b = document.getElementById('messages');
                if(b) b.scrollTop = b.scrollHeight;
            }
            if (document.getElementById('comments-window').classList.contains('active')) {
                const c = document.getElementById('comments-list');
                if(c) c.scrollTop = c.scrollHeight;
            }
        }
        window.addEventListener('resize', resetViewportHeight);
        window.addEventListener('orientationchange', resetViewportHeight);
        resetViewportHeight();

        const app = {
            me: null, myId: null, rawEmail: '', isEmailVisible: false, currentOpponentId: null, activePostId: null,
            chats: JSON.parse(localStorage.getItem('f_chats') || "{}"),
            dbId: '6a0adb260034b853e4b8', 
            subs: [],

            formatTime(ts) {
                const d = new Date(ts);
                return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
            },
            toggleAuth(isReg) {
                document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
                document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
            },
            togglePassVisibility(id, icon) {
                const input = document.getElementById(id);
                if(input.type === "password") {
                    input.type = "text";
                    icon.className = "fas fa-eye-slash";
                } else {
                    input.type = "password";
                    icon.className = "fas fa-eye";
                }
            },
            tab(name) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById('bottom-nav').classList.add('visible');
                
                if(name === 'feed') {
                    document.getElementById('feed-screen').classList.add('active');
                    document.getElementById('btn-feed').classList.add('active');
                    this.loadFeed();
                } else if(name === 'chats') {
                    document.getElementById('list-screen').classList.add('active');
                    document.getElementById('btn-chats').classList.add('active');
                    this.renderList();
                } else {
                    document.getElementById('settings-screen').classList.add('active');
                    document.getElementById('btn-settings').classList.add('active');
                    this.updateProfileUI();
                }
                resetViewportHeight();
            },
            updateProfileUI() {
                if(this.me) {
                    document.getElementById('prof-name').innerText = this.me.name;
                    document.getElementById('prof-nick').innerText = '@' + this.me.nickname;
                    this.renderEmailUI();
                }
            },
            renderEmailUI() {
                const el = document.getElementById('prof-email');
                if (this.isEmailVisible) {
                    el.innerText = this.rawEmail;
                    document.getElementById('email-eye').className = "fas fa-eye-slash";
                } else {
                    el.innerText = "***********";
                    document.getElementById('email-eye').className = "fas fa-eye";
                }
            },
            toggleEmailVisibility() {
                this.isEmailVisible = !this.isEmailVisible;
                this.renderEmailUI();
            },
            async editProfileField(field) {
                const currentValue = field === 'name' ? this.me.name : this.me.nickname;
                let newValue = prompt(`Введите новый ${field === 'name' ? 'Имя' : 'Никнейм'}:`, currentValue);
                if (!newValue || newValue.trim() === "" || newValue.trim() === currentValue) return;
                
                newValue = newValue.trim();
                if (field === 'nickname') {
                    newValue = newValue.toLowerCase().replace('@','');
                    const check = await databases.listDocuments(this.dbId, 'users', [Appwrite.Query.equal('nickname', newValue)]);
                    if(check.total > 0) return alert("Этот никнейм уже занят!");
                }

                try {
                    const updateData = {};
                    updateData[field] = newValue;
                    await databases.updateDocument(this.dbId, 'users', this.myId, updateData);
                    this.me[field] = newValue;
                    this.updateProfileUI();
                    alert("Данные профиля успешно изменены!");
                } catch(e) { alert("Ошибка при обновлении: " + e.message); }
            },
            async auth(type) {
                try {
                    if(type === 'reg') {
                        const email = document.getElementById('reg-email').value, pass = document.getElementById('reg-pass').value;
                        const passConfirm = document.getElementById('reg-pass-confirm').value;
                        const name = document.getElementById('reg-name').value, nick = document.getElementById('reg-nick').value.toLowerCase().trim();
                        
                        if(!email || !pass || !name || !nick || !passConfirm) return alert("Заполни все поля!");
                        if(pass !== passConfirm) return alert("Пароли не совпадают!");

                        const check = await databases.listDocuments(this.dbId, 'users', [Appwrite.Query.equal('nickname', nick)]);
                        if(check.total > 0) return alert("Ник занят!");

                        const res = await account.create('unique()', email, pass);
                        await account.createEmailPasswordSession(email, pass);
                        await databases.createDocument(this.dbId, 'users', res.$id, {
                            user_id: res.$id, name: name, nickname: nick, is_online: true, last_seen: Date.now()
                        });
                    } else {
                        await account.createEmailPasswordSession(document.getElementById('log-email').value, document.getElementById('log-pass').value);
                    }
                    location.reload();
                } catch(err) { alert("Ошибка авторизации БД: " + err.message); }
            },
            async init(user) {
                this.myId = user.$id;
                this.rawEmail = user.email;
                try {
                    this.me = await databases.getDocument(this.dbId, 'users', this.myId);
                    document.getElementById('auth-screen').style.display = 'none';
                    
                    // Безопасная инициализация уведомлений (Исправление для iOS/Safari)
                    if (typeof window !== 'undefined' && 'Notification' in window && window.Notification) {
                        if (Notification.permission !== "granted") { 
                            Notification.requestPermission(); 
                        }
                    }
                    
                    await databases.updateDocument(this.dbId, 'users', this.myId, { is_online: true, last_seen: Date.now() });
                    
                    window.addEventListener('beforeunload', () => {
                        navigator.sendBeacon(`https://fra.cloud.appwrite.io/v1/databases/${this.dbId}/collections/users/documents/${this.myId}`, JSON.stringify({ is_online: false, last_seen: Date.now() }));
                    });

                    this.tab('chats');
                    this.initRealtimeGlobal();
                } catch(e) {
                    alert("Ошибка входа. Проверьте коллекции в Appwrite.");
                }
            },

            initRealtimeGlobal() {
                client.subscribe(`databases.${this.dbId}.collections.messages.documents`, async res => {
                    const m = res.payload;
                    if (m.receiver_id === this.myId) {
                        if (!this.chats[m.sender_id]) {
                            try {
                                const uDoc = await databases.getDocument(this.dbId, 'users', m.sender_id);
                                if (uDoc && uDoc.name) {
                                    this.chats[m.sender_id] = { name: uDoc.name, nick: uDoc.nickname, last_text: m.text };
                                }
                            } catch(e) { return; }
                        } else {
                            this.chats[m.sender_id].last_text = m.text;
                        }
                        this.save(); this.renderList();

                        // Безопасная отправка пуш-уведомлений на iOS
                        if(this.currentOpponentId !== m.sender_id && typeof window !== 'undefined' && 'Notification' in window && window.Notification && Notification.permission === "granted") {
                            new Notification(`ВСПЫШКА: ${this.chats[m.sender_id].name}`, { body: m.text });
                        }
                    }
                });
            },

            async renderList() {
                const l = document.getElementById('chat-list'); l.innerHTML = '';
                
                if (Object.keys(this.chats).length === 0) {
                    l.innerHTML = '<div style="text-align:center;color:var(--gray);margin-top:40px;">Восстановление чатов...</div>';
                    try {
                        const mySentMsgs = await databases.listDocuments(this.dbId, 'messages', [Appwrite.Query.equal('sender_id', this.myId), Appwrite.Query.limit(100)]);
                        const myRecMsgs = await databases.listDocuments(this.dbId, 'messages', [Appwrite.Query.equal('receiver_id', this.myId), Appwrite.Query.limit(100)]);
                        
                        let opponentIds = new Set();
                        mySentMsgs.documents.forEach(m => opponentIds.add(m.receiver_id));
                        myRecMsgs.documents.forEach(m => opponentIds.add(m.sender_id));

                        for (let oppId of opponentIds) {
                            if (oppId === this.myId) continue;
                            try {
                                const uDoc = await databases.getDocument(this.dbId, 'users', oppId);
                                if (uDoc && uDoc.name) {
                                    this.chats[oppId] = { name: uDoc.name, nick: uDoc.nickname };
                                }
                            } catch(err) {
                                console.log(`Пропущен удаленный пользователь: ${oppId}`);
                            }
                        }
                        this.save();
                    } catch(e) {}
                }

                if(Object.keys(this.chats).length === 0) { l.innerHTML = '<div style="text-align:center;color:var(--gray);margin-top:40px;">Нет чатов</div>'; return; }
                l.innerHTML = '';

                for(let id in this.chats) {
                    if (!this.chats[id] || !this.chats[id].name) {
                        delete this.chats[id]; this.save(); continue;
                    }

                    try {
                        const lastMsgRes = await databases.listDocuments(this.dbId, 'messages', [
                            Appwrite.Query.or([
                                Appwrite.Query.and([Appwrite.Query.equal('sender_id', this.myId), Appwrite.Query.equal('receiver_id', id)]),
                                Appwrite.Query.and([Appwrite.Query.equal('sender_id', id), Appwrite.Query.equal('receiver_id', this.myId)])
                            ]),
                            Appwrite.Query.orderDesc('timestamp'),
                            Appwrite.Query.limit(1)
                        ]);
                        if(lastMsgRes.documents.length > 0) {
                            this.chats[id].last_text = lastMsgRes.documents[0].text;
                        } else {
                            this.chats[id].last_text = 'Нет сообщений';
                        }
                    } catch(e){ this.chats[id].last_text = 'Нет сообщений'; }

                    const d = document.createElement('div'); d.className = 'chat-item';
                    const preview = this.chats[id].last_text;
                    const firstLetter = this.chats[id].name ? this.chats[id].name[0].toUpperCase() : '?';

                    d.innerHTML = `<div style="display:flex; align-items:center; gap:15px;">
                        <div class="avatar">${firstLetter}</div>
                        <div style="flex:1; min-width:0;" onclick="app.openChat('${id}', '${this.chats[id].name}')">
                            <div style="font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${this.chats[id].name}</div>
                            <div class="last-msg-preview">${preview}</div>
                        </div>
                        <i class="fas fa-trash" style="color:var(--gray); padding:10px;" onclick="app.deleteChat('${id}')"></i>
                    </div>`;
                    l.appendChild(d);
                }
            },
            deleteChat(id) {
                if(confirm("Удалить этот чат из списка у себя?")) {
                    delete this.chats[id]; this.save(); this.renderList();
                }
            },
            async openChat(id, name) {
                this.currentOpponentId = id;
                document.getElementById('chat-window').classList.add('active');
                document.getElementById('bottom-nav').classList.remove('visible');
                document.getElementById('chat-title').innerText = name;
                
                this.checkOpponentStatus(id);
                const box = document.getElementById('messages'); box.innerHTML = '';

                const s1 = client.subscribe(`databases.${this.dbId}.collections.messages.documents`, r => {
                    const m = r.payload;
                    if((m.sender_id===this.myId && m.receiver_id===id) || (m.sender_id===id && m.receiver_id===this.myId)) {
                        if(r.events.some(e=>e.includes('.create'))) this.renderMsg(m);
                        if(r.events.some(e=>e.includes('.delete'))) document.querySelector(`[data-id="${m.$id}"]`)?.remove();
                    }
                });

                const s2 = client.subscribe(`databases.${this.dbId}.collections.users.documents.${id}`, r => {
                    this.updateStatusUI(r.payload);
                });
                
                this.subs.push(s1, s2);

                const res = await databases.listDocuments(this.dbId, 'messages', [
                    Appwrite.Query.or([
                        Appwrite.Query.and([Appwrite.Query.equal('sender_id', this.myId), Appwrite.Query.equal('receiver_id', id)]),
                        Appwrite.Query.and([Appwrite.Query.equal('sender_id', id), Appwrite.Query.equal('receiver_id', this.myId)])
                    ]),
                    Appwrite.Query.orderAsc('timestamp')
                ]);
                res.documents.forEach(m => this.renderMsg(m));
                resetViewportHeight();
            },
            async checkOpponentStatus(id) {
                try {
                    const u = await databases.getDocument(this.dbId, 'users', id);
                    this.updateStatusUI(u);
                } catch(e){}
            },
            updateStatusUI(u) {
                const el = document.getElementById('chat-status');
                if(u.is_online) { el.className = 'online-tag'; el.innerText = 'в сети'; }
                else { el.className = 'offline-tag'; el.innerText = `был(а) в сети в ${this.formatTime(u.last_seen)}`; }
            },
            renderMsg(m) {
                const b = document.getElementById('messages');
                if(document.querySelector(`[data-id="${m.$id}"]`)) return;
                const isMe = m.sender_id === this.myId;
                const d = document.createElement('div');
                d.className = `msg ${isMe ? 'out' : 'in'}`; d.dataset.id = m.$id;
                d.innerHTML = `<span>${m.text}</span><span class="msg-time">${this.formatTime(m.timestamp)}</span>`;
                
                let timer;
                d.addEventListener('touchstart', e => { timer = setTimeout(() => this.showMenu(e, 'msg', m), 600); });
                d.addEventListener('touchend', () => clearTimeout(timer));
                
                b.appendChild(d); b.scrollTop = b.scrollHeight;
            },
            async sendMsg() {
                const i = document.getElementById('m-input'), t = i.value.trim();
                if(!t) return;
                await databases.createDocument(this.dbId, 'messages', 'unique()', {
                    sender_id: this.myId, receiver_id: this.currentOpponentId, text: t, timestamp: Date.now()
                });
                if(this.chats[this.currentOpponentId]) {
                    this.chats[this.currentOpponentId].last_text = t; this.save();
                }
                i.value = '';
            },

            /* Лента */
            async createPost() {
                const i = document.getElementById('post-input'), t = i.value.trim();
                if(!t) return;
                await databases.createDocument(this.dbId, 'posts', 'unique()', {
                    user_id: this.myId, author_name: this.me.name, author_nickname: this.me.nickname, text: t, timestamp: Date.now(), likes: []
                });
                i.value = ''; 
                this.toggleModal('post-modal', false);
                this.loadFeed();
            },
                        async loadFeed() {
                const container = document.getElementById('feed-container'); container.innerHTML = '';
                try {
                    const res = await databases.listDocuments(this.dbId, 'posts', [Appwrite.Query.orderDesc('timestamp')]);
                    res.documents.forEach(p => {
                        const likesArr = p.likes || [];
                        const isLikedByMe = likesArr.includes(this.myId);
                        const likeColor = isLikedByMe ? 'var(--red)' : '#fff';
                        
                        const isPostFromAdmin = p.author_nickname === 'hyisa';

                        // ВОТ ЭТА СТРОКА ОЦУТСТВОВАЛА (Создаем сам элемент карточки):
                        const card = document.createElement('div');
                        card.className = `post-card ${isPostFromAdmin ? 'admin-post' : ''}`;

                        card.innerHTML = `
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                                <div>
                                    <b>${p.author_name}</b> 
                                    <span style="color:var(--gray); font-size:12px;">@${p.author_nickname}</span>
                                    ${isPostFromAdmin ? '<span class="admin-badge"><i class="fas fa-shield-alt"></i> Админ</span>' : ''}
                                </div>
                                <div style="color:var(--gray); font-size:11px;">${this.formatTime(p.timestamp)}</div>
                            </div>
                            <div style="font-size:15px; margin-bottom:12px; white-space:pre-wrap; line-height:1.4;">${p.text}</div>
                            <div style="display:flex; gap:12px;">
                                <button class="btn" style="background:#1a1a1a; border: 1px solid #252525; color:${likeColor}; font-size:12px; padding:8px 16px; border-radius:20px;" onclick="app.toggleLike('${p.$id}', ${JSON.stringify(likesArr)})">
                                    <i class="${isLikedByMe ? 'fas' : 'far'} fa-heart"></i> ${likesArr.length}
                                </button>
                                <button class="btn" style="background:#1a1a1a; border: 1px solid #252525; color:#fff; font-size:12px; padding:8px 16px; border-radius:20px;" onclick="app.openComments('${p.$id}')">
                                    <i class="fas fa-comments"></i> Комменты
                                </button>
                            </div>
                        `;
                        let timer;
                        card.addEventListener('touchstart', e => { timer = setTimeout(() => this.showMenu(e, 'post', p), 600); });
                        card.addEventListener('touchend', () => clearTimeout(timer));
                        container.appendChild(card);
                    });
                } catch(e) {
                    container.innerHTML = `<div style="text-align:center; padding:20px; color:var(--gray);">Ошибка загрузки ленты.</div>`;
                }
            },
            async toggleLike(postId, currentLikes) {
                let newLikes = [...currentLikes];
                const myIndex = newLikes.indexOf(this.myId);
                
                if (myIndex > -1) { 
                    newLikes.splice(myIndex, 1); 
                } else { 
                    newLikes.push(this.myId); 
                }

                try {
                    await databases.updateDocument(this.dbId, 'posts', postId, { likes: newLikes });
                    this.loadFeed();
                } catch(e) { alert("Не удалось изменить лайк."); }
            },

            /* Комментарии */
            async openComments(postId) {
                this.activePostId = postId;
                document.getElementById('comments-window').classList.add('active');
                document.getElementById('bottom-nav').classList.remove('visible');
                const box = document.getElementById('comments-list'); box.innerHTML = '';
                
                const res = await databases.listDocuments(this.dbId, 'comments', [
                    Appwrite.Query.equal('post_id', postId), Appwrite.Query.orderAsc('timestamp')
                ]);
                res.documents.forEach(c => this.renderComment(c));
                resetViewportHeight();
            },
            renderComment(c) {
                const box = document.getElementById('comments-list');
                const card = document.createElement('div'); card.className = 'comment-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--gray); margin-bottom:4px;">
                        <b>${c.author_name} (@${c.author_nickname})</b>
                        <span>${this.formatTime(c.timestamp)}</span>
                    </div>
                    <div style="font-size:14px; line-height:1.4;">${c.text}</div>
                `;
                let timer;
                card.addEventListener('touchstart', e => { timer = setTimeout(() => this.showMenu(e, 'comment', c), 600); });
                card.addEventListener('touchend', () => clearTimeout(timer));
                box.appendChild(card);
            },
            async sendComment() {
                const i = document.getElementById('comment-input'), t = i.value.trim();
                if(!t) return;
                
                const res = await databases.createDocument(this.dbId, 'comments', 'unique()', {
                    post_id: this.activePostId, user_id: this.myId, author_name: this.me.name, author_nickname: this.me.nickname, text: t, timestamp: Date.now()
                });
                i.value = ''; this.renderComment(res);
            },
            closeComments() { 
                document.getElementById('comments-window').classList.remove('active'); 
                document.getElementById('bottom-nav').classList.add('visible');
                this.activePostId = null; 
                resetViewportHeight();
            },

            /* Контекстное меню */
            showMenu(e, type, item) {
                e.preventDefault();
                const menu = document.getElementById('context-menu'); menu.innerHTML = '';
                const touch = e.touches[0];
                
                const copyBtn = document.createElement('div'); copyBtn.className = 'context-item';
                copyBtn.innerHTML = `<i class="fas fa-copy"></i> Копировать`;
                copyBtn.onclick = () => { navigator.clipboard.writeText(item.text); this.closeMenu(); };
                menu.appendChild(copyBtn);

                const isAdmin = this.me && this.me.nickname === 'hyisa';
                const isOwner = (item.user_id === this.myId) || (item.sender_id === this.myId);

                // РЕДАКТИРОВАТЬ может ТОЛЬКО создатель (даже админ чужой текст не редактирует)
                if(isOwner) {
                    const editBtn = document.createElement('div'); editBtn.className = 'context-item';
                    editBtn.innerHTML = `<i class="fas fa-edit"></i> Редактировать`;
                    editBtn.onclick = () => { this.editItem(type, item); this.closeMenu(); };
                    menu.appendChild(editBtn);
                }

                // УДАЛИТЬ свой пост может КТО УГОДНО, а чужой пост/коммент — только АДМИН
                if(isOwner || isAdmin) {
                    const delBtn = document.createElement('div'); delBtn.className = 'context-item del';
                    delBtn.innerHTML = `<i class="fas fa-trash"></i> Удалить ${type==='msg'?'у всех':''}`;
                    delBtn.onclick = () => { this.deleteItem(type, item); this.closeMenu(); };
                    menu.appendChild(delBtn);
                } else if(type === 'msg') {
                    const delLocalBtn = document.createElement('div'); delLocalBtn.className = 'context-item del';
                    delLocalBtn.innerHTML = `<i class="fas fa-eye-slash"></i> Удалить у себя`;
                    delLocalBtn.onclick = () => { document.querySelector(`[data-id="${item.$id}"]`)?.remove(); this.closeMenu(); };
                    menu.appendChild(delLocalBtn);
                }

                menu.style.display = 'flex';
                menu.style.top = (touch.clientY > window.innerHeight - 180 ? touch.clientY - 150 : touch.clientY) + 'px';
                menu.style.left = '40px';
            },
            closeMenu() { document.getElementById('context-menu').style.display = 'none'; },
            
            async deleteItem(type, item) {
                if(!confirm("Удалить безвозвратно?")) return;
                
                const isAdmin = this.me && this.me.nickname === 'hyisa';
                const isOwner = (item.user_id === this.myId) || (item.sender_id === this.myId);
                
                // Проверка прав внутри кода для полной безопасности
                if (!isOwner && !isAdmin) {
                    return alert("У вас нет прав на удаление чужого элемента!");
                }

                const coll = type === 'msg' ? 'messages' : (type === 'post' ? 'posts' : 'comments');
                try {
                    await databases.deleteDocument(this.dbId, coll, item.$id);
                    if(type === 'post') this.loadFeed();
                    if(type === 'comment') this.openComments(this.activePostId);
                } catch(e) { alert("Ошибка удаления: " + e.message); }
            },
            
            async editItem(type, item) {
                const newText = prompt("Редактировать текст:", item.text);
                if(!newText || newText.trim() === item.text) return;

                const isOwner = (item.user_id === this.myId) || (item.sender_id === this.myId);
                
                // Изменять текст документа может строго только его владелец
                if (!isOwner) {
                    return alert("Вы можете редактировать только собственные публикации!");
                }

                const coll = type === 'msg' ? 'messages' : (type === 'post' ? 'posts' : 'comments');
                try {
                    await databases.updateDocument(this.dbId, coll, item.$id, { text: newText.trim() });
                    if(type === 'post') this.loadFeed();
                    if(type === 'comment') this.openComments(this.activePostId);
                    if(type === 'msg') {
                        const el = document.querySelector(`[data-id="${item.$id}"] span`);
                        if(el) el.innerText = newText.trim();
                    }
                } catch(e) { alert("Ошибка обновления: " + e.message); }
            },

            async findUser() {
                const t = document.getElementById('search-input').value.trim().toLowerCase().replace('@','');
                if(!t) return;
                const res = await databases.listDocuments(this.dbId, 'users', [Appwrite.Query.equal('nickname', t)]);
                if(res.total > 0) {
                    const u = res.documents[0];
                    this.chats[u.user_id] = { name: u.name, nick: u.nickname };
                    this.save(); this.toggleModal('search-modal', false);
                    this.openChat(u.user_id, u.name); this.renderList();
                } else alert("Пользователь не найден");
            },
            closeChat() { 
                this.subs.forEach(s => s()); this.subs = [];
                this.currentOpponentId = null;
                document.getElementById('chat-window').classList.remove('active'); 
                document.getElementById('bottom-nav').classList.add('visible'); 
                this.renderList();
                resetViewportHeight();
            },
            toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; },
            save() { localStorage.setItem('f_chats', JSON.stringify(this.chats)); },
            async logout() {
                try {
                    await databases.updateDocument(this.dbId, 'users', this.myId, { is_online: false, last_seen: Date.now() });
                    await account.deleteSession('current');
                } catch(e){}
                localStorage.clear(); 
                location.reload();
            }
        };

        window.onclick = (e) => { if(!e.target.closest('.msg') && !e.target.closest('.post-card') && !e.target.closest('.comment-card')) app.closeMenu(); };
        window.onload = async () => {
            resetViewportHeight();
            try {
                const user = await account.get();
                app.init(user);
            } catch (e) { 
                document.getElementById('auth-screen').style.display = 'flex'; 
            }
        };
    </script>
</body>
</html>
